<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uniéndote al grupo…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --bg: #050f0a;
    --surface: #0d1f15;
    --border: rgba(37,211,102,0.12);
    --text: #e8f5ec;
    --muted: #4a7a5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-glow {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }
  .bg-glow::before {
    content: '';
    position: absolute;
    top: -30%; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(37,211,102,0.07) 0%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: translateX(-50%) scale(1); opacity: 0.7; }
    50%      { transform: translateX(-50%) scale(1.15); opacity: 1; }
  }
  .wrap {
    position: relative; z-index: 1;
    text-align: center;
    padding: 2rem 1.5rem;
    width: 100%; max-width: 360px;
    animation: rise 0.5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .wa-icon {
    width: 72px; height: 72px;
    margin: 0 auto 1.4rem;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(37,211,102,0.25);
    animation: iconPop 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both;
  }
  @keyframes iconPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .wa-icon svg { width: 38px; height: 38px; fill: #fff; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.45rem; font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text); margin-bottom: 0.4rem; line-height: 1.2;
  }
  .sub {
    font-size: 0.82rem; color: var(--muted);
    margin-bottom: 2rem; font-weight: 500;
  }
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px; height: 5px;
    overflow: hidden; margin-bottom: 1.2rem;
  }
  .progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--green-dark), var(--green));
    border-radius: 99px;
    transition: width 0.06s linear;
    box-shadow: 0 0 8px rgba(37,211,102,0.6);
  }
  .status-text {
    font-size: 0.75rem; color: var(--muted);
    margin-bottom: 2.5rem; min-height: 1.1em;
    transition: opacity 0.3s;
  }
  .manual {
    display: none; flex-direction: column;
    gap: 0.75rem;
    animation: rise 0.4s ease both;
  }
  .manual-label {
    font-size: 0.78rem; color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .btn {
    display: flex; align-items: center;
    justify-content: center; gap: 0.55rem;
    padding: 0.85rem 1.4rem;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 500;
    text-decoration: none;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .btn:hover  { background: #122b1c; box-shadow: 0 0 16px rgba(37,211,102,0.12); }
  .btn:active { transform: scale(0.97); }
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.2s ease-in-out infinite;
    vertical-align: middle; margin-right: 0.3rem;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="wa-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </div>

  <h1>Uniéndote al grupo</h1>
  <p class="sub"><span class="dot"></span>Detectando tu dispositivo…</p>

  <div class="progress-wrap">
    <div class="progress-bar" id="bar"></div>
  </div>
  <div class="status-text" id="status">Analizando sistema operativo…</div>

  <div class="manual" id="manual">
    <p class="manual-label">Selecciona tu dispositivo manualmente:</p>
    <a class="btn" href="https://chat.whatsapp.com/IsOYeZsXEIy7XfnlCN5uqm?mode=gi_t">
      🍎 &nbsp;Soy usuario de iPhone / iOS
    </a>
    <a class="btn" href="https://chat.whatsapp.com/DjnduepPNGe38wXpL3FUsT?mode=gi_t">
      🤖 &nbsp;Soy usuario de Android
    </a>
  </div>
</div>

<script>
(function () {
  var IOS_URL     = 'https://chat.whatsapp.com/IsOYeZsXEIy7XfnlCN5uqm?mode=gi_t';
  var ANDROID_URL = 'https://chat.whatsapp.com/DjnduepPNGe38wXpL3FUsT?mode=gi_t';

  var bar    = document.getElementById('bar');
  var status = document.getElementById('status');
  var manual = document.getElementById('manual');

  /* ── Sistema de puntuación multi-señal ── */
  function detectOS() {
    var ua       = navigator.userAgent || '';
    var platform = navigator.platform  || '';
    var vendor   = navigator.vendor    || '';
    var maxTouch = navigator.maxTouchPoints || 0;

    var ios = 0, droid = 0;

    // 1. User-Agent — señal más fuerte
    if (/iPhone|iPod/i.test(ua))                            ios   += 40;
    if (/iPad/i.test(ua))                                   ios   += 40;
    if (/Android/i.test(ua))                                droid += 40;

    // 2. iPad disfrazado como macOS (iOS 13+, "Request Desktop Site")
    if (/Macintosh/i.test(ua) && maxTouch > 1)              ios   += 35;

    // 3. Navigator.platform
    if (/iPhone|iPod|iPad/i.test(platform))                 ios   += 20;
    if (/MacIntel|MacPPC/i.test(platform) && maxTouch > 0)  ios   += 15;
    if (/Android|Linux armv/i.test(platform))               droid += 20;

    // 4. Vendor (solo Safari/iOS reporta "Apple Computer, Inc.")
    if (/Apple/i.test(vendor))                              ios   += 10;

    // 5. API exclusiva de iOS Safari — la señal más confiable
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function')
                                                            ios   += 30;

    // 6. Chrome en iOS usa "CriOS" en el UA
    if (/CriOS/i.test(ua))                                  ios   += 15;

    // 7. Firefox en Android usa "Fennec"
    if (/Fennec/i.test(ua) && /Android/i.test(ua))         droid += 15;

    // 8. Táctil sin Android ni Windows → probablemente iOS
    if (maxTouch > 0 && !/Android/i.test(ua) && !/Windows/i.test(ua))
                                                            ios   += 8;

    // 9. Samsung Browser → Android
    if (/SamsungBrowser/i.test(ua))                         droid += 20;

    // 10. MIUI / HuaweiBrowser → Android
    if (/MIUI|HuaweiBrowser/i.test(ua))                    droid += 20;

    // 11. window.MSStream nunca existe en iOS
    if (window.MSStream) { ios = 0; }

    if (ios === 0 && droid === 0) return 'unknown';
    return ios >= droid ? 'ios' : 'android';
  }

  /* ── Animación de progreso ~1.5 s ── */
  var pct = 0;
  var msgs = [
    [25, 'Leyendo señales del sistema…'],
    [55, 'Cruzando múltiples indicadores…'],
    [85, 'Confirmando resultado…'],
    [100,'¡Listo! Redirigiendo…']
  ];
  var mi = 0;

  var iv = setInterval(function () {
    pct = Math.min(pct + 2.5, 100);
    bar.style.width = pct + '%';

    if (mi < msgs.length && pct >= msgs[mi][0]) {
      status.textContent = msgs[mi][1];
      mi++;
    }

    if (pct >= 100) {
      clearInterval(iv);
      go();
    }
  }, 38);

  function go() {
    var os = detectOS();
    if (os === 'ios') {
      status.textContent = '✓ iPhone / iOS detectado';
      setTimeout(function(){ window.location.href = IOS_URL; }, 350);
    } else if (os === 'android') {
      status.textContent = '✓ Android detectado';
      setTimeout(function(){ window.location.href = ANDROID_URL; }, 350);
    } else {
      status.textContent = 'No pudimos detectar tu dispositivo.';
      manual.style.display = 'flex';
    }
  }
})();
</script>
</body>
</html>

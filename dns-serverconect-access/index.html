<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- ICONOS (Remix Icon - estable) -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet" />

  <style>
    /* TODO TU CSS SIN CAMBIOS */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f3f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text-primary: #111111;
      --text-secondary: #666666;
      --shadow: 0 2px 16px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.08);
      --accent-ff: #E8340A;
      --accent-wa: #25D366;
      --btn-radius: 20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e0e;
        --surface: #1a1a1a;
        --border: rgba(255,255,255,0.07);
        --text-primary: #f0f0f0;
        --text-secondary: #888888;
        --shadow: 0 2px 20px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
        --shadow-hover: 0 8px 48px rgba(0,0,0,0.6), 0 2px 10px rgba(0,0,0,0.4);
      }
    }

    html, body { height: 100%; width: 100%; }

    body {
      background-color: var(--bg);
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      padding: 22px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--btn-radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: 0.18s;
    }

    .btn-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-ff .btn-icon {
      background: #E8340A;
    }

    .btn-wa .btn-icon {
      background: #25D366;
    }

    .btn-icon i {
      font-size: 26px;
      color: #ffffff;
    }

    .btn-text {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .btn-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--text-primary);
    }

    .btn-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .btn-arrow i {
      font-size: 20px;
      color: var(--text-secondary);
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="container">

    <a href="freefire://" class="btn btn-ff">
      <div class="btn-icon">
        <i class="ri-fire-fill"></i>
      </div>
      <div class="btn-text">
        <span class="btn-label">Free Fire</span>
        <span class="btn-sub">Abrir juego</span>
      </div>
      <div class="btn-arrow">
        <i class="ri-arrow-right-line"></i>
      </div>
    </a>

    <div class="divider"></div>

    <a href="https://chat.whatsapp.com/IsOYeZsXEIy7XfnlCN5uqm?mode=gi_t" class="btn btn-wa" target="_blank">
      <div class="btn-icon">
        <i class="ri-whatsapp-fill"></i>
      </div>
      <div class="btn-text">
        <span class="btn-label">WhatsApp</span>
        <span class="btn-sub">Unirse al grupo</span>
      </div>
      <div class="btn-arrow">
        <i class="ri-arrow-right-line"></i>
      </div>
    </a>

  </div>
</body>
</html>
